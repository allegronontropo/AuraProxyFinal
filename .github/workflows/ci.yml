name: CI

on:
  push:
    branches: ["develop", "main", "master"]
  pull_request:
    branches: ["develop", "main", "master"]

jobs:
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aura
          POSTGRES_PASSWORD: aura_password
          POSTGRES_DB: aura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Run Linters
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test:unit

      - name: Run E2E Tests
        env:
          DATABASE_URL: postgresql://aura:aura_password@localhost:5432/aura_test
          REDIS_URL: redis://localhost:6379
          MOCK_PROVIDERS: "1"
          AURA_CACHE_E2E: "1"
          OPENAI_API_KEY: "mock_key"
        run: npm run test:e2e

      - name: Build Project
        run: npm run build
